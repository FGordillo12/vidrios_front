<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión | Vidrios Alejo SAS</title>
  <link rel="stylesheet" href="/auth/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="/img/vidrioslogo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="/img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="auth-container">
    <div class="logo-container">
      <img src="/img/vidrioslogo.png" alt="Vidrios Alejo SAS" class="auth-logo">
      <h1>Vidrios Alejo SAS</h1>
    </div>

    <h2>Iniciar sesión</h2>
    <p class="auth-lead">Ingresa con tu correo registrado en el sistema.</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" required autocomplete="username">
      </div>
      <div class="form-group password-container">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input type="password" id="password" required autocomplete="current-password">
          <button type="button" id="togglePassword" class="toggle-password-btn" aria-label="Mostrar u ocultar contraseña">
            <i class="fa-solid fa-eye toggle-icon" id="togglePasswordIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-submit">Ingresar</button>
    </form>

    <div class="auth-links">
      <p>¿No tienes cuenta? <a href="/auth/register.html">Regístrate</a></p>
      <p><a href="/auth/forgot-password.html">¿Olvidaste tu contraseña?</a></p>
    </div>

    <div id="message" class="message" aria-live="polite"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const API_BASE = typeof window.API_BASE !== 'undefined' ? window.API_BASE : 'http://localhost:3000';
      const token = localStorage.getItem('token');
      if (token) {
        fetch(`${API_BASE}/api/me`, { headers: { Authorization: 'Bearer ' + token } })
          .then((response) => {
            if (response.ok) {
              window.location.href = '/index.html';
            } else {
              localStorage.removeItem('token');
              const messageEl = document.getElementById('message');
              if (messageEl) {
                messageEl.textContent = 'Sesión expirada, por favor ingresa nuevamente';
                messageEl.className = 'message error';
                messageEl.style.display = 'block';
              }
            }
          })
          .catch(() => localStorage.removeItem('token'));
      }

      const toggleBtn = document.getElementById('togglePassword');
      const passwordInput = document.getElementById('password');
      const icon = document.getElementById('togglePasswordIcon');
      if (toggleBtn && passwordInput && icon) {
        toggleBtn.addEventListener('click', () => {
          const show = passwordInput.type === 'password';
          passwordInput.type = show ? 'text' : 'password';
          icon.classList.toggle('fa-eye', !show);
          icon.classList.toggle('fa-eye-slash', show);
        });
      }
    });
  </script>

  <script src="/js/api-config.js"></script>
  <script src="/auth/auth.js"></script>

  <div id="loadingModal" class="loading-modal">
    <div class="loading-content">
      <div class="spinner"></div>
      <p>Cargando, por favor espera...</p>
    </div>
  </div>
</body>
</html>
