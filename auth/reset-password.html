<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restablecer Contraseña | Vidrios Alejo SAS</title>
  <link rel="stylesheet" href="/auth/auth.css">
  <link rel="icon" href="/img/vidrioslogo.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    .message {
      margin-top: 1em;
      font-weight: bold;
    }
    .message.success {
      color: green;
    }
    .message.error {
      color: red;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="logo-container">
      <img src="/img/vidrioslogo.png" alt="Vidrios Alejo SAS" class="auth-logo">
      <h1>Vidrios Alejo SAS</h1>
    </div>

    <h2>Restablecer Contraseña</h2>

    <form id="resetForm">
      <div class="form-group password-container">
      <label for="newPassword">Nueva Contraseña:</label>
      <div class="password-wrapper">
        <input type="password" id="newPassword" required>
        <i id="togglePassword" class="toggle-password fa-solid fa-eye"></i>
      </div>
    </div>

      <button type="submit" class="btn-submit">Actualizar Contraseña</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script src="/js/api-config.js"></script>
  <script>
  const API_BASE = typeof window.API_BASE !== 'undefined' ? window.API_BASE : 'http://localhost:3000';
  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const newPassword = document.getElementById('newPassword').value;
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const messageEl = document.getElementById('message');
    const button = document.querySelector('button[type="submit"]');
    const modal = document.getElementById('modal-reset-loading');

    messageEl.textContent = '';
    messageEl.className = 'message';
    button.disabled = true;

    if (!token) {
      messageEl.textContent = 'Token no proporcionado';
      messageEl.classList.add('error');
      button.disabled = false;
      return;
    }

    // Mostrar modal de carga
    modal.style.display = 'flex';

    try {
      const res = await fetch(`${API_BASE}/api/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword })
      });

      const data = await res.json();

      if (res.ok) {
        messageEl.textContent = '✅ Contraseña actualizada correctamente. Redirigiendo al inicio de sesión...';
        messageEl.classList.add('success');

        setTimeout(() => {
          modal.style.display = 'none'; // Ocultar modal antes de redirigir
          window.location.href = '/auth/login.html';
        }, 1500); // ⏳ Tiempo opcional para dejar ver el mensaje
      } else {
        modal.style.display = 'none'; // Ocultar modal si hay error
        messageEl.textContent = data.error || 'Error al restablecer contraseña';
        messageEl.classList.add('error');
        button.disabled = false;
      }
    } catch (err) {
      modal.style.display = 'none';
      messageEl.textContent = 'Error de red o del servidor';
      messageEl.classList.add('error');
      button.disabled = false;
    }
  });
</script>




  <script>
  document.getElementById('togglePassword').addEventListener('click', () => {
    const passwordInput = document.getElementById('newPassword');
    const icon = document.getElementById('togglePassword');
    const isPassword = passwordInput.type === 'password';
    
    passwordInput.type = isPassword ? 'text' : 'password';
    icon.classList.toggle('fa-eye');
    icon.classList.toggle('fa-eye-slash');
  });
</script>


<!-- Modal de carga mejorado -->
<div id="modal-reset-loading" class="loading-reset">
  <div class="modal-content">
    <div class="spinner"></div>
    <p>Actualizando nueva contraseña...</p>
  </div>
</div>


<script>
  document.addEventListener('DOMContentLoaded', () => {
    const modal = document.getElementById('modal-reset-loading');
    if (modal) {
      modal.style.display = 'none'; // Oculta el modal al cargar
    }
  });
</script>




</body>
</html>
