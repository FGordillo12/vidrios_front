<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña | Vidrios Alejo SAS</title>
  <link rel="stylesheet" href="/auth/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="/img/vidrioslogo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="/img/favicon.ico" type="image/x-icon">
</head>
<body>
  <div class="auth-container">
    <h2>Recuperar contraseña</h2>
    <form id="forgotPasswordForm">
      <div class="form-group">
        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" required>
      </div>
      <button type="submit" class="btn-submit">Enviar enlace de recuperación</button>
    </form>
    <div id="message" class="message"></div>
    <p><a href="/auth/login.html">Volver al inicio de sesión</a></p>
  </div>

  <!-- Modal de carga y resultado -->
  <div id="modal-recuperacion-loading" class="modal-recuperacion-loading">
    <div class="modal-content">
      <span id="close-modal-btn" class="close-btn">&times;</span>
      <div id="modal-spinner" class="spinner"></div>
      <p id="modal-recuperacion-message">Enviando correo de recuperación...</p>
    </div>
  </div>

  <script src="/js/api-config.js"></script>
  <script>
    const API_BASE = typeof window.API_BASE !== 'undefined' ? window.API_BASE : 'http://localhost:3000';
    const form = document.getElementById('forgotPasswordForm');
    const modal = document.getElementById('modal-recuperacion-loading');
    const modalMsg = document.getElementById('modal-recuperacion-message');
    const modalSpinner = document.getElementById('modal-spinner');
    const messageEl = document.getElementById('message');
    const closeModalBtn = document.getElementById('close-modal-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;

      // Mostrar modal con spinner
      modal.style.display = 'flex';
      modalSpinner.style.display = 'block';
      modalMsg.textContent = 'Enviando correo de recuperación...';
      messageEl.textContent = '';
      messageEl.className = 'message';

      try {
        const res = await fetch(`${API_BASE}/api/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        // Mostrar mensaje, quitar spinner
        modalSpinner.style.display = 'none';
        modalMsg.textContent = data.message || data.error || 'Respuesta recibida';
        if (data.error) {
          messageEl.classList.add('error');
        }

      } catch (error) {
        modalSpinner.style.display = 'none';
        modalMsg.textContent = '❌ Error al enviar la solicitud.';
        messageEl.classList.add('error');
      }
    });

    // Cerrar modal al hacer clic en la "X"
    closeModalBtn.addEventListener('click', () => {
      modal.style.display = 'none';
    });
  </script>
</body>
</html>
