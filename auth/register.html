<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro | Vidrios Alejo SAS</title>
  <link rel="stylesheet" href="/auth/auth.css" />
  <link rel="icon" href="/img/favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" href="/img/vidrioslogo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="auth-container">
    <div class="logo-container">
      <img src="/img/vidrioslogo.png" alt="Vidrios Alejo SAS" class="auth-logo" />
      <h1>Vidrios Alejo SAS</h1>
    </div>

    <h2>Crear cuenta</h2>
    <p class="auth-lead">Accede al cotizador y gestión de precios de la vidriería.</p>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label for="username">Nombre de usuario</label>
        <input type="text" id="username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="form-group password-container">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input type="password" id="password" required autocomplete="new-password" minlength="6" />
          <button type="button" class="toggle-password-btn" data-target="password" aria-label="Mostrar u ocultar contraseña">
            <i class="fa-solid fa-eye toggle-icon"></i>
          </button>
        </div>
      </div>
      <div class="form-group password-container">
        <label for="confirmPassword">Confirmar contraseña</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" required autocomplete="new-password" minlength="6" />
          <button type="button" class="toggle-password-btn" data-target="confirmPassword" aria-label="Mostrar u ocultar contraseña">
            <i class="fa-solid fa-eye toggle-icon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit">Registrarse</button>
    </form>

    <div class="auth-links">
      <p>¿Ya tienes cuenta? <a href="/auth/login.html">Iniciar sesión</a></p>
    </div>

    <div id="message" class="message" aria-live="polite"></div>
  </div>

  <script src="/js/api-config.js"></script>
  <script src="/auth/auth.js"></script>
  <script>
    document.querySelectorAll('.toggle-password-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-target');
        const input = document.getElementById(id);
        const icon = btn.querySelector('.toggle-icon');
        if (!input || !icon) return;
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        icon.classList.toggle('fa-eye', !show);
        icon.classList.toggle('fa-eye-slash', show);
      });
    });
  </script>

  <div id="errorModal" class="loading-modal">
    <div class="loading-content">
      <div class="error-icon"><i class="fas fa-exclamation-circle"></i></div>
      <p id="modalMessage">Ha ocurrido un error</p>
      <button type="button" id="closeModalBtn" class="btn-submit" style="margin-top: 1rem;">Cerrar</button>
    </div>
  </div>
</body>
</html>
